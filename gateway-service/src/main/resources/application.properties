spring.application.name=gateway-service
server.port=9000

# Conexión a Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# DESACTIVAMOS el descubrimiento automático para que no interfiera con nuestras rutas fijas
spring.cloud.gateway.discovery.locator.enabled=false

# --- RUTA 0: PRODUCTOS ---
# Si la URL es /api/v01/pd/products/dashboard, StripPrefix=3 deja /products/dashboard
spring.cloud.gateway.routes[0].id=product-route
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v01/products/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=3

# --- RUTA 1: INVENTARIO ---
spring.cloud.gateway.routes[1].id=inventory-route
spring.cloud.gateway.routes[1].uri=lb://inventory-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v01/inventory/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=3

# --- RUTA 2: PURCHASE ---
spring.cloud.gateway.routes[2].id=purchase-route
spring.cloud.gateway.routes[2].uri=lb://purchase-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v01/purchase/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=3