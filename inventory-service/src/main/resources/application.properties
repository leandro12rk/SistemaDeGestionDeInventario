spring.application.name=inventory-service
server.port=9091

# Configuración de base de datos (Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5433/inventory_db
spring.datasource.username=adminUser
spring.datasource.password=admin


# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# --- EUREKA CLIENT ---
# Conexión a Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- CONFIGURACIÓN DE FEIGN (Opcional) ---
# Tiempo de espera para conectar con otros microservicios (en ms)
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000


# --- LOGS ---
logging.level.io.github.leandro12rk.inventory=DEBUG