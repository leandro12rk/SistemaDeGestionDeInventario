docs:
  content: |-
    ## Inventory Service API

    This system manages stock levels, inventory movements, and goods receipts through specialized modules.

    | Module | Description |
    | :--- | :--- |
    | **StockMovementsModule** | CRUD operations for inventory movements (additions, updates, queries, and deletions). |
    | **GoodReceiptsModule** | Registration and recording of product receipts. |
    | **InventoryModule** | General inventory administration and management queries. |
  type: text/markdown
