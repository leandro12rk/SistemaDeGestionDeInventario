  content: |
    ## Supplier Management API

    The Supplier Management module provides the following endpoints to handle supplier data operations:

    | Method | Endpoint | Description |
    | :--- | :--- | :--- |
    | **GET** | `/suppliers` | Retrieve a list of all suppliers. |
    | **GET** | `/suppliers/{id}` | Retrieve details of a specific supplier by ID. |
    | **GET** | `/suppliers/{id}/name` | Retrieve the name of a supplier by ID. |
    | **POST** | `/suppliers` | Create a new supplier record. |
    | **PUT** | `/suppliers/{id}` | Update existing supplier data by ID. |
    | **DELETE** | `/suppliers/{id}` | Remove a supplier record by ID. |
  type: text/markdown
