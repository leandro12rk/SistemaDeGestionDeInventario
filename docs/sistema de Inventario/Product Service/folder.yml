docs:
  content: |-
    ## Product Service API

    This microservice manages the product catalog, categories, and suppliers through specialized modules.

    | Module | Description |
    | :--- | :--- |
    | **CategoryModule** | Full CRUD operations for categories. |
    | **ProductModule** | Full CRUD operations for products and dashboard analytics. |
    | **SupplierModule** | Full CRUD operations for suppliers. |
  type: text/markdown
