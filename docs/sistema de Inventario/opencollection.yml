docs:
  content: |-
    # 📦 Inventory Management System API Documentation

    Welcome to the **Inventory Management System** API collection. This project leverages a robust microservices architecture to streamline product catalog management, stock control, and procurement processes.

    ---

    ## 🚀 System Architecture

    The system is organized into modular microservices accessible through a centralized API Gateway:

    | Service | Port | Responsibility |
    | :--- | :--- | :--- |
    | **Product Service** | `9090` | Product catalog and category management. |
    | **Inventory Service** | `9091` | Stock levels and warehouse monitoring. |
    | **Purchase Service** | `9092` | Purchase orders and supplier management. |
    | **API Gateway** | `9000` | Single entry point (Base Path: `/api/v01`). |

    ---

    ## 🛠️ Local Setup

    Ensure your local development environment is configured correctly:

    * **Databases:** PostgreSQL instances running on ports `5432`, `5433`, and `5434`.
    * **Microservices:** All services must be registered and active within the discovery service.

    ---

    ## 🔐 Environment Variables

    Ensure your environment configuration (e.g., "Local") includes the following variables:

    * `baseUrl`: `http://localhost:9000/api/v01`
    * `productServiceUrl`: `http://localhost:9090`

    ---

    ## 📌 Best Practices

    * **Filtering:** Use the `?supplierName=` query parameter in the **Product Service** to filter results efficiently.
    * **Validation:** All `POST` and `PUT` requests require a valid **JSON** body. Ensure mandatory fields (such as `name`) are included to avoid `400 Bad Request` errors.
    * **Workflow:** To maintain data integrity, always create a **Product** before attempting to update its associated **Inventory**.

    ---

    ## 📞 Contact & Support

    * **Developer:** Leandro
    * **GitHub Repository:** [leandro12rk/SistemaDeGestionDeInventario](https://github.com/leandro12rk/SistemaDeGestionDeInventario)

    ---
    *Built with modern microservices principles.*
  type: text/markdown
