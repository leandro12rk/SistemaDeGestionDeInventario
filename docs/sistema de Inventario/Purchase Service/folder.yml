  content: |-
    ## Purchase Service API

    This service manages purchase orders and their specific details, ensuring a structured procurement process through specialized modules.

    | Module | Description |
    | :--- | :--- |
    | **PurchaseOrderDetailsModule** | Management of individual product line items within purchase orders. |
    | **PurchaseOrdersModule** | Administration of purchase order headers, including status tracking and general info. |
