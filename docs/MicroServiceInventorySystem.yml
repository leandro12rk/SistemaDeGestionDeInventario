            | :--- | :--- | :--- |
            | **GET** | `/categories` | Retrieve a list of all product categories. |
            | **GET** | `/categories/{id}` | Retrieve details of a specific category by ID. |
            | **POST** | `/categories` | Create a new product category. |
            | **PUT** | `/categories/{id}` | Update existing category data by ID. |
            | **DELETE** | `/categories/{id}` | Remove a category record by ID. |
          type: text/markdown
